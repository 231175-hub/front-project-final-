<div class="flex flex-column gap-4 p-4">
  
  <!-- Back navigation and header info -->
  <div class="flex justify-content-between align-items-center mb-2 pb-3 border-bottom-1 surface-border">
    <div class="flex align-items-center gap-3">
      <p-button icon="pi pi-arrow-left" [rounded]="true" [text]="true" (click)="goBack()" />
      <div *ngIf="school" class="flex align-items-center gap-3">
        <img [src]="env.URL_NORMAL + school.urlImageSchool" alt="Logo de la escuela" class="h-3rem border-round shadow-1 object-contain bg-white p-1" style="max-width: 60px;" />
        <div>
          <h2 class="text-2xl font-bold text-900 m-0">{{ school.nameSchool }}</h2>
          <p class="text-500 text-sm mt-1 m-0">Lista de cursos ofertados en esta escuela profesional.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Courses Table -->
  <div class="surface-card p-4 shadow-2 border-round-xl border-1 surface-border">
    <p-table [value]="coursesList" [loading]="loading" styleClass="p-datatable-striped" [tableStyle]="{ 'min-width': '100%' }">
      <ng-template #header>
        <tr>
          <th class="text-center font-bold" style="width: 15%;">Código</th>
          <th class="font-bold" style="width: 30%;">Nombre del Curso</th>
          <th class="text-center font-bold" style="width: 10%;">Créditos</th>
          <th class="text-center font-bold" style="width: 15%;">Categoría</th>
        </tr>
      </ng-template>

      <ng-template #body let-course>
        <tr>
          <td class="text-center font-semibold text-700">{{ course.code }}</td>
          <td class="font-medium text-900">{{ course.nameCourse }}</td>
          <td class="text-center">{{ course.credits }}</td>
          <td class="text-center">
            <span class="p-tag font-semibold px-2 py-1 border-round-md bg-blue-50 text-blue-700 border-1 border-blue-200">
              {{ course.category }}
            </span>
          </td>
        </tr>
      </ng-template>

      <!-- Empty state -->
      <ng-template #emptymessage>
        <tr>
          <td colspan="4" class="text-center py-6 text-500">
            <i class="pi pi-book text-4xl text-300 mb-3 block"></i>
            No hay cursos registrados para esta escuela profesional.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

</div>
