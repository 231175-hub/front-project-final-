<div id="form" class="card w-full p-4">
    <form [formGroup]="frmInsertSchool">
        <div class="card flex flex-wrap justify-center items-end gap-4 pb-2">
            <label>Nombre de la Escuela</label>
            <input type="text" pInputText formControlName="nameSchool" />
        </div>

        <div class="card w-4">
            <p-toast />
            <label>Imagen de la Escuela</label>
            <p-fileupload #imageUpload name="myfile[]" url="https://www.primefaces.org/cdn/api/upload.php" [multiple]="false" accept="image/*" maxFileSize="1000000" (onUpload)="onTemplatedUpload()" (onSelect)="onSelectedFiles($event)">
                <ng-template #header let-files let-chooseCallback="chooseCallback" let-clearCallback="clearCallback" let-uploadCallback="uploadCallback">
                    <div class="flex flex-wrap justify-between items-center flex-1 gap-4">
                        <div class="flex gap-2">
                            <p-button (onClick)="choose($event, chooseCallback)" icon="pi pi-images" [rounded]="true" [outlined]="true" />
                        </div>
                    </div>
                </ng-template>
                <ng-template #content let-files let-uploadedFiles="uploadedFiles" let-removeFileCallback="removeFileCallback" let-removeUploadedFileCallback="removeUploadedFileCallback">
                    <div class="flex flex-col gap-8 pt-4">
                        <div *ngIf="files?.length > 0">
                            <h5>Imagen de Escuela</h5>
                            <div class="flex flex-wrap gap-4">
                                <div *ngFor="let file of files; let i = index" class="p-8 rounded-border flex flex-col border border-surface items-center gap-4">
                                    <div>
                                        <img role="presentation" [alt]="file.name" [src]="file.objectURL" width="100" height="50" />
                                    </div>
                                    <span class="font-semibold text-ellipsis max-w-60 whitespace-nowrap overflow-hidden">{{ file.name }}</span>
                                    <div>{{ formatSize(file.size) }}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </ng-template>
                <ng-template #file></ng-template>
                <ng-template #empty>
                    <div class="flex items-center justify-center flex-col">
                        <i onclick="choose($event, chooseCallback)" class="pi pi-cloud-upload border-2! rounded-full! p-8 !text-4xl! text-muted-color!"></i>
                        <p class="mt-6 mb-0">Escudo de la Escuela Profesional.</p>
                    </div>
                </ng-template>
            </p-fileupload>
        </div>

        <div class="card flex justify-center pt-2">
            <p-toast />
            <p-confirmdialog>
                <ng-template #message let-message>
                    @if (message) {
                        <div class="flex flex-col items-center w-full gap-4 border-b border-surface-200 dark:border-surface-700">
                            <i [ngClass]="message.icon" class="text-6xl text-primary-500"></i>
                            <p>{{ message.message }}</p>
                        </div>
                    }
                </ng-template>
            </p-confirmdialog>
            <p-button (click)="sendInsertSchool($event)" label="Save" />
        </div>
    </form>
</div>
