<div class="flex w-8 justify-content-end">
    <p-table [columns]="cols" [value]="academicPeriodList" [tableStyle]="{ 'min-width': '50rem' }">
        
        <ng-template #header let-columns>
            <tr>
                @for (col of columns; track col) {
                    <th>
                        {{ col.header }}
                    </th>
                }
            </tr>
        </ng-template>

        <ng-template #body let-rowData let-columns="columns">
            <tr>
                @for (col of columns; track col) {
                    <td>
                        @if (col.field === 'status') {
                            <p-tag [value]="rowData[col.field]" [severity]="getSeverity(rowData[col.field])" />
                        } @else if(col.field === 'update') {
                            <p-button (click)="updateAcademicPeriod( $event, rowData.idPeriod )">Actualizar Periodo Academico</p-button>
                        }@else if (col.field === 'delete'){
                            <p-button (click)="deleteAcademicPeriod($event, rowData.idPeriod)">Eliminar</p-button>
                        }@else {
                            {{ rowData[col.field] }}
                        }
                    </td>
                }
            </tr>
        </ng-template>
        
    </p-table>
</div>
