<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <form [formGroup]="frmInsertCourse">
        <div class="card flex justify-center">
            <label for="school">Ingrese una Escuela Profesional</label>
            <p-select [options]="listSchool" id="school" formControlName="idSchool" optionLabel="nameSchool" optionValue="idSchool" [filter]="true"  placeholder="Seleccione una Escuela" class="w-full md:w-56" />
        </div>

        <div class="card flex justify-center">
            <label for="semester">Ingrese el semestre del curso</label>
            <p-select [options]="listSemester" id="semester" formControlName="idSemester" optionLabel="numberSemester" optionValue="idSemester" placeholder="Selecciona un Semestre" class="w-full md:w-56" />
        </div>

        <div class="card flex justify-center">
            <label for="code">Ingrese el codigo del curso</label>
            <input type="text" id="code" pInputText formControlName="code" placeholder="Codigo" />
        </div>
        <div class="card flex justify-center">
            <label for="credits">Ingrese los creditos del curso</label>
            <input type="text" id="credits" pInputText formControlName="credits" placeholder="Creditos" />
        </div>
        <div class="card flex justify-center">
            <label for="nameCourse">Ingrese los nombre del curso</label>
            <input type="text" id="nameCourse" pInputText formControlName="nameCourse" placeholder="Nombre" />
        </div>
        <div class="card flex justify-center">
            <label for="nameCourse">Ingrese la categoria del curso</label>
            <p-select [options]="categories" formControlName="category" optionLabel="category" optionValue="category" placeholder="Selecciona una categoria" class="w-full md:w-56" />
        </div>
        <div class="card flex justify-center">
            <label for="conceptualWeight">Ingrese el peso Conceptual del curso</label>
            <input type="text" id="conceptualWeight" pInputText formControlName="conceptualWeight" placeholder="Peso Conceptual" />
        </div>
        <div class="card flex justify-center">
            <label for="practicalWeight">Ingrese el peso Practico del curso</label>
            <input type="text" id="practicalWeight" pInputText formControlName="practicalWeight" placeholder="Peso Practico" />
        </div>
        <div class="card flex justify-center">
            <label for="attitudinalWeight">Ingrese el peso Actitudinaldel curso</label>
            <input type="text" id="attitudinalWeight" pInputText formControlName="attitudinalWeight" placeholder="Peso Actitudinal" />
        </div>
    </form>


    <div class="flex flex-col gap-2">
        <div class="flex items-center gap-4 mb-2">
            <p-button label="Agregar Unidades" styleClass="bg-black hover:bg-gray-800 border-black text-white rounded-full px-4" (click)="addUnit()" />
            <span class="text-red-300 font-semibold text-sm">Datos opcionales</span>
        </div>

        <div class="border rounded-md overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="border-b bg-gray-50">
                    <tr>
                        <th class="p-3 text-sm font-bold text-gray-800 text-center">Descripción</th>
                        <th class="p-3 text-sm font-bold text-gray-800 text-center w-32">ACCIONES</th>
                    </tr>
                </thead>
                <tbody>
                    @for(value of unitRowList; track value.id) {
                        <tr class="border-b last:border-none">
                            <td class="p-2 text-center">
                                <input type="text" value="{{ value.id }}" readonly pInputText />
                            </td>
                            <td class="p-2 text-center">
                                <p-button label="Retirar" severity="danger" styleClass="bg-orange-500 hove:bg-orange-600 border-orange-600 text-white rounded-full p-button-sm px-4" (click)="removeUnit(value)" />
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="flex justify-end border-t pt-4 mt-2">
    <p-button label="Registrar datos" severity="info" (click)="sendInsertCourse($event)" styleClass="rounded-full px-6" />
</div>
