<div style="display: block; width: 100%; padding: 24px; min-height: 100vh; background-color: #f8fafc;">
    
    <div class="flex justify-between items-center mb-2">
        <h2 class="text-2xl font-bold text-gray-800">Mis Grupos Asignados</h2>
        <span class="text-sm font-medium bg-blue-100 text-blue-800 px-3 py-1 rounded-full">Periodo Actual</span>
    </div>

    <div class="bg-white rounded-xl shadow-sm border overflow-hidden mt-4">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-50 border-b">
                <tr>
                    <th class="p-4 text-sm font-semibold text-slate-600">Curso</th>
                    <th class="p-4 text-sm font-semibold text-slate-600 text-center">Grupo</th>
                    <th class="p-4 text-sm font-semibold text-slate-600 text-center">Inscritos</th>
                    <th class="p-4 text-sm font-semibold text-slate-600 text-right w-72">Acciones</th>
                </tr>
            </thead>
            <tbody>
                @for (group of assignedGroups; track group.idGroup) {
                    <tr class="border-b last:border-none hover:bg-slate-50 transition-colors">
                        <td class="p-4">
                            <div class="flex flex-col">
                                <span class="font-bold text-slate-800">{{ group.nameCourse }}</span>
                                <span class="text-xs font-mono text-slate-500">Cód: {{ group.courseCode || 'ISII8' }}</span>
                            </div>
                        </td>
                        <td class="p-4 text-center">
                            <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 font-bold">
                                {{ group.nameGroup }}
                            </span>
                        </td>
                        <td class="p-4 text-center">
                            <span class="text-sm font-medium text-slate-600">{{ group.studentCount || '1' }} alumnos</span>
                        </td>
                        <td class="p-4 text-right">
                            <div class="flex justify-end gap-2">
                                
                                <p-button 
                                    label="Abrir Registro" 
                                    icon="pi pi-file-excel" 
                                    [loading]="loadingStates[group.idGroup] || false"
                                    (click)="openAcademicRegister(group.idGroup)" 
                                    styleClass="bg-green-600 hover:bg-green-700 border-green-600 text-white rounded-lg px-4 py-2 shadow-sm text-sm font-medium transition-colors" />
                                
                                <p-button 
                                    label="Cerrar Acta" 
                                    icon="pi pi-lock" 
                                    [loading]="closingStates[group.idGroup] || false"
                                    (click)="closeAcademicRegister(group.idGroup)" 
                                    styleClass="bg-red-600 hover:bg-red-700 border-red-600 text-white rounded-lg px-4 py-2 shadow-sm text-sm font-medium transition-colors" />

                            </div>
                        </td>
                    </tr>
                } @empty {
                    <tr>
                        <td colspan="4" class="p-8 text-center text-slate-500">No hay grupos asignados.</td>
                    </tr>
                }
            </tbody>
        </table>
    </div>
</div>
