<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="flex flex-col gap-2">
        <div class="flex items-center gap-4 mb-2">
            <p-button label="Registrar Semestres" styleClass="bg-black hover:bg-gray-800 border-black text-white rounded-full px-4" (click)="addUnit()" />
            <span class="text-red-300 font-semibold text-sm">Datos opcionales</span>
        </div>

        <div class="border rounded-md overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="border-b bg-gray-50">
                    <tr>
                        <th class="p-3 text-sm font-bold text-gray-800 text-center">Descripción</th>
                        <th class="p-3 text-sm font-bold text-gray-800 text-center w-32">ACCIONES</th>
                    </tr>
                </thead>
                <tbody>
                    @for(value of semesterRowList; track value.id) {
                        <tr class="border-b last:border-none">
                            <td class="p-2 text-center">
                                <input type="text" value="{{ value.id }}" readonly pInputText />
                            </td>
                            <td class="p-2 text-center">
                                <p-button label="Retirar" severity="danger" styleClass="bg-orange-500 hove:bg-orange-600 border-orange-600 text-white rounded-full p-button-sm px-4" (click)="removeUnit(value)" />
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="flex justify-end border-t pt-4 mt-2">
    <p-button label="Registrar datos" (click)="sendInsertSemester($event)" severity="info" styleClass="rounded-full px-6" />
</div>
